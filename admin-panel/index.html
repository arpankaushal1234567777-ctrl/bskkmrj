<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSKKMRJ Admin – Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body class="admin-bg">
  <main class="auth-shell">
    <section class="auth-card">
      <header class="auth-header">
        <div class="auth-logo">BSKKMRJ Admin</div>
       <p class="auth-sub">Secure access for administrators only.</p>
      </header>

      <form id="loginForm" class="form" autocomplete="off">
        <div id="credentialsFields">
          <label>
            <span>Username or Email</span>
            <input type="text" name="identifier" required placeholder="admin" />
          </label>
          <label>
            <span>Password</span>
            <input type="password" name="password" required minlength="6" placeholder="12345678" />
          </label>
          <label class="checkbox">
            <input type="checkbox" name="rememberMe" />
            <span>Remember me</span>
          </label>
          <button type="submit" class="btn btn-primary">Sign in</button>
        </div>

        <div id="otpFields" hidden>
          <p class="form-info" style="margin-bottom:16px; color:var(--text-muted); font-size:14px; text-align:center;">An OTP code has been sent to your email.</p>
          <label>
            <span>Verification Code (OTP)</span>
            <input type="text" id="otpCode" name="otp" placeholder="123456" maxlength="6" pattern="\d{6}" />
          </label>
          <button type="button" id="otpVerifyBtn" class="btn btn-primary">Confirm Code</button>
        </div>

        <p id="loginError" class="form-error" hidden></p>
      </form>

      <footer class="auth-footer">
        <p>Powered by BSKKMRJ CMS</p>
      </footer>
    </section>
  </main>

  <script src="./js/admin-api.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>
