<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSKKMRJ Admin – Manage News</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body class="admin-bg">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">BSKKMRJ Admin</div>
        <button id="sidebarToggle" class="sidebar-toggle" type="button">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-link">Dashboard</a>
        <a href="./manage-news.html" class="nav-link active">Manage News</a>
        <a href="./add-event.html" class="nav-link">Manage Events</a>
        <a href="./manage-gallery.html" class="nav-link">Manage Gallery</a>
        <a href="./manage-team.html" class="nav-link">Manage Team</a>
        <button id="logoutBtn" class="nav-link nav-link-danger" type="button">Sign out</button>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-main-header">
        <h1>Manage News</h1>
        <p>Create, edit and delete news posts shown on the public site.</p>
      </header>

      <section class="admin-section">
        <header class="admin-section-header">
          <h2>Create / Edit</h2>
        </header>
        <form id="newsForm" class="form">
          <input type="hidden" id="newsId" />
          <label>
            <span>Title</span>
            <input type="text" id="newsTitle" required />
          </label>
          <label>
            <span>Excerpt / Short Description</span>
            <textarea id="newsExcerpt" rows="3"></textarea>
          </label>
          <label>
            <span>Full Article URL (external, e.g. bskkm.com link)</span>
            <input type="url" id="newsUrl" required />
          </label>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="newsSaveBtn">Save</button>
            <button type="button" class="btn btn-secondary" id="newsResetBtn">Reset</button>
          </div>
          <p id="newsFormMsg" class="form-message" hidden></p>
        </form>
      </section>

      <section class="admin-section">
        <header class="admin-section-header">
          <h2>Existing News</h2>
        </header>
        <div id="newsTable" class="table-shell"></div>
      </section>
    </main>
  </div>

  <script src="./js/admin-api.js"></script>
  <script src="./js/manage-news.js"></script>
</body>
</html>
