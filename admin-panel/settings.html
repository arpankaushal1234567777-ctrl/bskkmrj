<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSKKMRJ Admin – Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body class="admin-bg">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="../frontend/assets/images/LOGO.jpeg" alt="Logo">
          BSKKMRJ Admin
        </div>
        <button id="sidebarToggle" class="sidebar-toggle" type="button">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-link">Dashboard</a>
        <a href="./manage-news.html" class="nav-link">Manage News</a>
        <a href="./add-event.html" class="nav-link">Manage Events</a>
        <a href="./manage-gallery.html" class="nav-link">Manage Gallery</a>
        <a href="./manage-team.html" class="nav-link">Manage Team</a>
        <a href="./user-management.html" class="nav-link">User Management</a>
        <a href="./donations.html" class="nav-link">Donations</a>
        <a href="./settings.html" class="nav-link active">Settings</a>
        <a href="./join-requests.html" class="nav-link">Join Requests</a>
        <button id="logoutBtn" class="nav-link nav-link-danger" type="button">Sign out</button>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-main-header">
        <h1>Platform Settings</h1>
        <p>Configure global platform settings, SEO, and contact details.</p>
      </header>

      <section class="admin-section" style="max-width:800px;">
        <form class="form" onsubmit="event.preventDefault(); alert('Settings Saved');">
          <div class="stat-card" style="margin-bottom:24px;">
            <header class="admin-section-header">
              <h2>Contact Information</h2>
            </header>
            <div class="form">
              <label><span>Public Phone Number</span><input type="text" value="01147095426" /></label>
              <label><span>Public Email</span><input type="email" value="contact@bskkmrj.com" /></label>
              <label><span>Headquarters Address</span><textarea>84, North Ave, North Avenue Road Area, Raisina Hills, New Delhi, Delhi 110001</textarea></label>
            </div>
          </div>

          <div class="stat-card" style="margin-bottom:24px;">
            <header class="admin-section-header">
              <h2>Social Media Links</h2>
            </header>
            <div class="form">
              <label><span>Facebook URL</span><input type="url" value="https://facebook.com/bskkmrj" /></label>
              <label><span>Twitter (X) URL</span><input type="url" value="https://twitter.com/bskkmrj" /></label>
              <label><span>Instagram URL</span><input type="url" value="https://instagram.com/bskkmrj" /></label>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save All Settings</button>
          </div>
        </form>
      </section>
    </main>
  </div>
</body>
</html>
