<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSKKMRJ Admin – Documents</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body class="admin-bg">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="../frontend/assets/images/LOGO.jpeg" alt="Logo">
          BSKKMRJ Admin
        </div>
        <button id="sidebarToggle" class="sidebar-toggle" type="button">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-link">Dashboard</a>
        <a href="./manage-news.html" class="nav-link">Manage News</a>
        <a href="./add-event.html" class="nav-link">Manage Events</a>
        <a href="./manage-gallery.html" class="nav-link">Manage Gallery</a>
        <a href="./manage-team.html" class="nav-link">Manage Team</a>
        <a href="./manage-about.html" class="nav-link">Manage About</a>
        <a href="./manage-documents.html" class="nav-link active">Documents</a>
        <a href="./settings.html" class="nav-link">Settings</a>
        <a href="./join-requests.html" class="nav-link">Join Requests</a>
        <a href="./contact-messages.html" class="nav-link">Messages</a>
        <button id="logoutBtn" class="nav-link nav-link-danger" type="button">Sign out</button>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-main-header">
        <h1>Documents</h1>
        <p>Upload and manage PDFs and other public documents.</p>
      </header>

      <section class="admin-section">
        <header class="admin-section-header">
          <h2>Create / Edit</h2>
        </header>
        <form id="docForm" class="form">
          <input type="hidden" id="docId" />
          <label><span>Title</span><input id="docTitle" type="text" required /></label>
          <label><span>Description</span><textarea id="docDescription" rows="3"></textarea></label>
          <label><span>File URL</span><input id="docFileUrl" type="url" placeholder="https://... or upload below" /></label>
          <label>
            <span>Upload PDF</span>
            <input id="docFile" type="file" accept="application/pdf" />
          </label>
          <label class="checkbox">
            <input type="checkbox" id="docPublished" checked />
            <span>Published</span>
          </label>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="docSaveBtn">Save</button>
            <button type="button" class="btn btn-secondary" id="docResetBtn">Reset</button>
          </div>
          <p id="docFormMsg" class="form-message" hidden></p>
        </form>
      </section>

      <section class="admin-section">
        <header class="admin-section-header">
          <h2>Existing Documents</h2>
        </header>
        <input type="text" id="searchBox" placeholder="Search documents..." class="admin-search">
        <div id="docTable" class="table-shell"></div>
      </section>
    </main>
  </div>

  <script src="./js/admin-api.js"></script>
  <script src="./js/admin-utils.js"></script>
  <script src="./js/manage-documents.js"></script>
</body>
</html>
