<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSKKMRJ Admin – Manage Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body class="admin-bg">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">BSKKMRJ Admin</div>
        <button id="sidebarToggle" class="sidebar-toggle" type="button">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-link">Dashboard</a>
        <a href="./manage-news.html" class="nav-link">Manage News</a>
        <a href="./add-event.html" class="nav-link">Manage Events</a>
        <a href="./manage-gallery.html" class="nav-link active">Manage Gallery</a>
        <a href="./manage-team.html" class="nav-link">Manage Team</a>
        <button id="logoutBtn" class="nav-link nav-link-danger" type="button">Sign out</button>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-main-header">
        <h1>Manage Gallery</h1>
        <p>Control the gallery items shown on the public gallery page.</p>
      </header>

      <section class="admin-section">
        <header class="admin-section-header">
          <h2>Create / Edit</h2>
        </header>
        <form id="galleryForm" class="form">
          <input type="hidden" id="galleryId" />
          <label>
            <span>Title</span>
            <input type="text" id="galleryTitle" required />
          </label>
          <label>
            <span>Date label (e.g. May 18, 2024)</span>
            <input type="text" id="galleryDate" required />
          </label>
          <label>
            <span>Image URL (for now; file uploads can be added later)</span>
            <input type="url" id="galleryImageUrl" />
          </label>
          <label>
          <span>Upload Image</span>
          <input type="file" id="galleryImage">
          <img id="galleryPreview" style="max-width:120px;margin-top:10px;">
          </label>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="gallerySaveBtn">Save</button>
            <button type="button" class="btn btn-secondary" id="galleryResetBtn">Reset</button>
          </div>
          <p id="galleryFormMsg" class="form-message" hidden></p>
        </form>
      </section>

      <section class="admin-section">
        <header class="admin-section-header">
          <h2>Existing Gallery Items</h2>
        </header>

        <input type="text" id="searchBox" placeholder="Search news..." class="admin-search">

        <div id="galleryTable" class="table-shell"></div>
      </section>
    </main>
  </div>

  <script src="./js/admin-api.js"></script>
  <script src="./js/manage-gallery.js"></script>

 <script>

function preview(input, target){

const file = input.files[0];

if(!file) return;

const reader = new FileReader();

reader.onload = function(e){
document.getElementById(target).src = e.target.result;
}

reader.readAsDataURL(file);

}

document.getElementById("newsImage")?.addEventListener("change",function(){
preview(this,"newsPreview");
});

document.getElementById("eventImage")?.addEventListener("change",function(){
preview(this,"eventPreview");
});

document.getElementById("galleryImage")?.addEventListener("change",function(){
preview(this,"galleryPreview");
});

document.getElementById("teamPhoto")?.addEventListener("change",function(){
preview(this,"teamPreview");
});

</script>
</body>
</html>
