<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSKKMRJ Admin – Manage Events</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body class="admin-bg">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">BSKKMRJ Admin</div>
        <button id="sidebarToggle" class="sidebar-toggle" type="button">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-link">Dashboard</a>
        <a href="./manage-news.html" class="nav-link">Manage News</a>
        <a href="./add-event.html" class="nav-link active">Manage Events</a>
        <a href="./manage-gallery.html" class="nav-link">Manage Gallery</a>
        <a href="./manage-team.html" class="nav-link">Manage Team</a>
        <button id="logoutBtn" class="nav-link nav-link-danger" type="button">Sign out</button>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-main-header">
        <h1>Manage Events</h1>
        <p>Control BSKKMRJ events displayed on Events and Gallery pages.</p>
      </header>

      <section class="admin-section">
        <header class="admin-section-header">
          <h2>Create / Edit</h2>
        </header>
        <form id="eventForm" class="form">
          <input type="hidden" id="eventId" />
          <label>
            <span>Title</span>
            <input type="text" id="eventTitle" required />
          </label>
          <label>
            <span>Date label (e.g. May 18, 2024)</span>
            <input type="text" id="eventDate" required />
          </label>
          <label>
            <span>Location (optional)</span>
            <input type="text" id="eventLocation" />
          </label>
          <label>
          <span>Upload Event Image</span>
          <input type="file" id="eventImage">
          <img id="eventPreview" style="max-width:120px;margin-top:10px;">
          </label>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="eventSaveBtn">Save</button>
            <button type="button" class="btn btn-secondary" id="eventResetBtn">Reset</button>
          </div>
          <p id="eventFormMsg" class="form-message" hidden></p>
        </form>
      </section>

      <section class="admin-section">
        <header class="admin-section-header">
          <h2>Existing Events</h2>
        </header>

        <input type="text" id="searchBox" placeholder="Search news..." class="admin-search">

        <div id="eventTable" class="table-shell"></div>
      </section>
    </main>
  </div>

  <script src="./js/admin-api.js"></script>
  <script src="./js/manage-events.js"></script>

<script>

document.querySelectorAll("input[type=file]").forEach(input=>{

input.addEventListener("dragover",e=>{
e.preventDefault();
input.style.border="2px dashed #007bff";
});

input.addEventListener("dragleave",()=>{
input.style.border="";
});

input.addEventListener("drop",e=>{

e.preventDefault();

input.files = e.dataTransfer.files;

});

});

</script>
</body>
</html>
