<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Us – BSKKMRJ</title>
  <meta name="description" content="Join Us – भारतीय श्रमिक कामगार कर्मचारी महासंघ राजस्थान" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div id="navbar-root"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="breadcrumb" data-i18n="crumbJoin">Join Us / Home / Join</p>
        <h1 data-i18n="pageJoinTitle">Join Us</h1>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <h2 class="section-title" data-i18n="pageJoinHeading">Member Registration</h2>
        <div class="card">
          <form class="form" id="joinForm">
            <label>
              <span>Name</span>
              <input type="text" name="name" required />
            </label>
            <label>
              <span>Email</span>
              <input type="email" name="email" required />
            </label>
            <label>
              <span>Phone</span>
              <input type="tel" name="phone" required />
            </label>
            <label>
              <span>Address</span>
              <input type="text" name="address" />
            </label>
            <label>
              <span>Occupation</span>
              <input type="text" name="occupation" />
            </label>
            <label>
              <span>Message</span>
              <textarea name="message" rows="4"></textarea>
            </label>
            <label>
              <span>Aadhaar Card Number</span>
              <input type="text" name="aadhaar_number" pattern="[0-9]{12}" maxlength="12" required title="Please enter exactly 12 digits" />
            </label>
            <label>
              <span>Upload Aadhaar Card Photo</span>
              <input type="file" name="aadhaar_photo" accept="image/jpeg, image/png, image/webp" required />
            </label>
            <button class="btn btn-primary" type="submit" id="joinSubmitBtn">Submit Join Request</button>
            <p id="formFeedback" class="form-feedback" hidden></p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-root"></div>
  <button id="langToggle" class="lang-toggle" type="button" aria-label="Switch language">English</button>

  <script src="../JS/lang.js"></script>
  <script src="../JS/api.js"></script>
  <script src="../JS/ui.js"></script>
  <script src="../JS/main.js"></script>
  <script>
    document.getElementById("joinForm")?.addEventListener("submit", async (e) => {
      e.preventDefault();
      const fb = document.getElementById("formFeedback");
      const btn = document.getElementById("joinSubmitBtn");
      fb.hidden = false;
      fb.className = "form-feedback form-feedback--loading";
      fb.textContent = "Submitting...";
      if (btn) btn.disabled = true;
      const fd = new FormData(e.target);
      const fileField = e.target.querySelector('input[name="aadhaar_photo"]');
      let base64Photo = "";
      if (fileField && fileField.files[0]) {
        try {
          base64Photo = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = () => reject(new Error("Failed to read Aadhaar photo"));
            reader.readAsDataURL(fileField.files[0]);
          });
        } catch (err) {
          fb.className = "form-feedback form-feedback--error";
          fb.textContent = err.message;
          if (btn) btn.disabled = false;
          return;
        }
      }
      try {
        await window.BSKKMRJ_API.apiPostJson("/api/join", {
          name: fd.get("name"),
          email: fd.get("email"),
          phone: fd.get("phone"),
          address: fd.get("address"),
          occupation: fd.get("occupation"),
          message: fd.get("message"),
          aadhaar_number: fd.get("aadhaar_number"),
          aadhaar_photo: base64Photo,
        });
        fb.className = "form-feedback form-feedback--success";
        fb.textContent = "Your join request was submitted successfully. We will contact you soon.";
        e.target.reset();
      } catch (err) {
        fb.className = "form-feedback form-feedback--error";
        fb.textContent = err.message || "Submission failed. Please try again.";
      } finally {
        if (btn) btn.disabled = false;
      }
    });
  </script>
</body>
</html>
