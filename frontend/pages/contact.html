<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – BSKKMRJ</title>
  <meta name="description" content="Contact – भारतीय श्रमिक कामगार कर्मचारी महासंघ राजस्थान" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/animations.css">
  <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
  <div id="navbar-root"></div>

  <main>
    <section class="page-hero">
      <div class="container">
        <p class="breadcrumb" data-i18n="crumbContact">Contact / Home / Contact</p>
        <h1 data-i18n="pageContactTitle">Contact Us</h1>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <h2 class="section-title" data-i18n="pageContactHeading">Get In Touch With Us</h2>
        <h3 data-i18n="pageContactSub">Know More Contact</h3>

        <div class="grid-2">
          <div class="card">
            <h3>भारतीय श्रमिक कामगार कर्मचारी महासंघ राजस्थान</h3>
            <p class="muted">Call us For Any Questions !</p>
            <p><a class="link" href="tel:+919451238931">+919451238931</a></p>
          </div>

          <div class="card">
            <h3>Send a message</h3>
            <form class="form" onsubmit="return false;">
              <label>
                <span>Name</span>
                <input type="text" placeholder="Name" />
              </label>
              <label>
                <span>Email</span>
                <input type="email" placeholder="Email" />
              </label>
              <label>
                <span>Message</span>
                <textarea rows="5" placeholder="Write your message"></textarea>
              </label>
              <button class="btn btn-primary" type="submit">Submit</button>
              <p class="muted small">Form submission can be wired to backend later.</p>
            </form>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="footer-root"></div>

  <script src="../JS/ui.js"></script>
  <script src="../JS/main.js"></script>
</body>
</html>
