<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSKKMRJ Admin – Manage About</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body class="admin-bg">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="../assets/images/LOGO.jpeg" alt="Logo">
          BSKKMRJ Admin
        </div>
        <button id="sidebarToggle" class="sidebar-toggle" type="button">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-link">Dashboard</a>
        <a href="./manage-news.html" class="nav-link">Manage News</a>
        <a href="./add-event.html" class="nav-link">Manage Events</a>
        <a href="./manage-gallery.html" class="nav-link">Manage Gallery</a>
        <a href="./manage-team.html" class="nav-link">Manage Team</a>
        <a href="./manage-about.html" class="nav-link active">Manage About</a>
        <a href="./manage-documents.html" class="nav-link">Documents</a>
        <a href="./settings.html" class="nav-link">Settings</a>
        <a href="./join-requests.html" class="nav-link">Join Requests</a>
        <a href="./contact-messages.html" class="nav-link">Messages</a>
        <button id="logoutBtn" class="nav-link nav-link-danger" type="button">Sign out</button>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-main-header">
        <h1>Manage About Page</h1>
        <p>Edit mission, vision, description, and history shown on the public about page.</p>
      </header>

      <section class="admin-section">
        <form id="aboutForm" class="form">
          <label>
            <span>Page title</span>
            <input type="text" id="aboutTitle" required />
          </label>
          <label>
            <span>Mission</span>
            <textarea id="aboutMission" rows="4"></textarea>
          </label>
          <label>
            <span>Vision</span>
            <textarea id="aboutVision" rows="4"></textarea>
          </label>
          <label>
            <span>Description (main body)</span>
            <textarea id="aboutDescription" rows="8"></textarea>
          </label>
          <label>
            <span>History</span>
            <textarea id="aboutHistory" rows="6"></textarea>
          </label>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="aboutSaveBtn">Save changes</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <script src="./js/admin-api.js"></script>
  <script src="./js/manage-about.js"></script>
</body>
</html>
