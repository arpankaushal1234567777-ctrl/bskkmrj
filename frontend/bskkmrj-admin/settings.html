<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSKKMRJ Admin – Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body class="admin-bg">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="../assets/images/LOGO.jpeg" alt="Logo">
          BSKKMRJ Admin
        </div>
        <button id="sidebarToggle" class="sidebar-toggle" type="button">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-link">Dashboard</a>
                <a href="./manage-news.html" class="nav-link">Manage News</a>
                <a href="./add-event.html" class="nav-link">Manage Events</a>
                <a href="./manage-gallery.html" class="nav-link">Manage Gallery</a>
                <a href="./manage-team.html" class="nav-link">Manage Team</a>
                <a href="./manage-about.html" class="nav-link">Manage About</a>
                <a href="./manage-documents.html" class="nav-link">Documents</a>
                <a href="./settings.html" class="nav-link active">Settings</a>
                <a href="./join-requests.html" class="nav-link">Join Requests</a>
                <a href="./contact-messages.html" class="nav-link">Messages</a>
        <button id="logoutBtn" class="nav-link nav-link-danger" type="button">Sign out</button>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-main-header">
        <h1>Platform Settings</h1>
        <p>Configure global platform settings, SEO, and contact details.</p>
      </header>

      <section class="admin-section" style="max-width:800px;">
        <form id="settingsForm" class="form">
          <div class="stat-card" style="margin-bottom:24px;">
            <header class="admin-section-header">
              <h2>Contact Information</h2>
            </header>
            <div class="form">
              <label><span>Public Phone Number</span><input id="settingsPhone" type="text" /></label>
              <label><span>Public Email</span><input id="settingsEmail" type="email" /></label>
              <label><span>Headquarters Address</span><textarea id="settingsAddress"></textarea></label>
            </div>
          </div>

          <div class="stat-card" style="margin-bottom:24px;">
            <header class="admin-section-header">
              <h2>Social Media Links</h2>
            </header>
            <div class="form">
              <label><span>Facebook URL</span><input id="settingsFacebook" type="url" /></label>
              <label><span>Twitter (X) URL</span><input id="settingsTwitter" type="url" /></label>
              <label><span>Instagram URL</span><input id="settingsInstagram" type="url" /></label>
              <label><span>YouTube URL</span><input id="settingsYoutube" type="url" /></label>
              <label><span>WhatsApp Link</span><input id="settingsWhatsapp" type="url" /></label>
            </div>
          </div>

          <div class="stat-card" style="margin-bottom:24px;">
            <header class="admin-section-header">
              <h2>SEO</h2>
            </header>
            <div class="form">
              <label><span>Website Title</span><input id="settingsSiteTitle" type="text" /></label>
              <label><span>Meta Description</span><textarea id="settingsSeoDescription" rows="3"></textarea></label>
              <label><span>Meta Keywords</span><input id="settingsSeoKeywords" type="text" placeholder="comma,separated,keywords" /></label>
            </div>
          </div>

          <div class="stat-card" style="margin-bottom:24px;">
            <header class="admin-section-header">
              <h2>Footer</h2>
            </header>
            <div class="form">
              <label><span>Footer Text</span><textarea id="settingsFooterText" rows="3"></textarea></label>
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save All Settings</button>
          </div>
          <p id="settingsMsg" class="form-message" hidden></p>
        </form>
      </section>
    </main>
  </div>

  <script src="./js/admin-api.js"></script>
  <script src="./js/settings.js"></script>
</body>
</html>
