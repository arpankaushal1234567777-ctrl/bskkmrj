<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSKKMRJ Admin – Join Requests</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/admin.css" />
</head>
<body class="admin-bg">
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <img src="../assets/images/LOGO.jpeg" alt="Logo">
          BSKKMRJ Admin
        </div>
        <button id="sidebarToggle" class="sidebar-toggle" type="button">☰</button>
      </div>
      <nav class="sidebar-nav">
        <a href="./dashboard.html" class="nav-link">Dashboard</a>
        <a href="./manage-news.html" class="nav-link">Manage News</a>
        <a href="./add-event.html" class="nav-link">Manage Events</a>
        <a href="./manage-gallery.html" class="nav-link">Manage Gallery</a>
        <a href="./manage-team.html" class="nav-link">Manage Team</a>
        <a href="./manage-about.html" class="nav-link">Manage About</a>
        <a href="./manage-documents.html" class="nav-link">Documents</a>
        <a href="./settings.html" class="nav-link">Settings</a>
        <a href="./join-requests.html" class="nav-link active">Join Requests</a>
        <a href="./contact-messages.html" class="nav-link">Messages</a>
        <button id="logoutBtn" class="nav-link nav-link-danger" type="button">Sign out</button>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-main-header">
        <h1>Join Requests</h1>
        <p>Applications from the public Join Us form.</p>
      </header>

      <section class="admin-section">
        <div class="table-actions-bar" style="margin-bottom: 1rem; display: flex; justify-content: flex-start;">
          <button id="bulkDeleteBtn" class="btn btn-danger" style="display:none; padding: 0.5rem 1rem; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">Delete Selected (<span id="selectedCount">0</span>)</button>
        </div>
        <div class="table-shell" style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th style="width: 40px;"><input type="checkbox" id="selectAllCheckbox" /></th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Address</th>
                <th>Occupation</th>
                <th>Message</th>
                <th>Aadhaar Number</th>
                <th>Aadhaar Photo</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="requestsTableBody">
              <tr><td colspan="11" style="text-align:center;">Loading requests...</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="./js/admin-api.js"></script>
  <script src="./js/join-requests.js"></script>
</body>
</html>
